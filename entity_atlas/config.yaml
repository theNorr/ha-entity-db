name: Entity Atlas
version: "1.0.2"
slug: entity_atlas
description: >-
  A dense, editable database of every Home Assistant entity — with
  device, area, floor, integration, and your own notes. Edits flow
  back into Home Assistant wherever possible.
url: "https://github.com/theNorr/ha-entity-db"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: services
boot: auto
init: false

# Expose via Home Assistant's Ingress so the UI appears inside HA
# and inherits HA authentication. No extra ports needed.
ingress: true
ingress_port: 8099
panel_icon: mdi:database-search
panel_title: Entity Atlas
panel_admin: true

# Talk to Home Assistant Core via the Supervisor proxy with the
# addon's auto-injected SUPERVISOR_TOKEN. No user-configured token.
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant

# Persist the comments DB in /data (survives addon updates)
map:
  - addon_config:rw

options: {}
schema: {}

#image: "ghcr.io/your-user/{arch}-addon-entity-atlas"
